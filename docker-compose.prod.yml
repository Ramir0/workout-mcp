services:
  api:
    build: .
    ports:
      - "9090:9090"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/workout_mcp
    depends_on:
      - db

  mcp:
    build: .
    ports:
      - "9091:9091"
    command: ["uv", "run", "uvicorn", "mcp_server_main:app", "--host", "0.0.0.0", "--port", "9091"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/workout_mcp
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=workout_mcp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
